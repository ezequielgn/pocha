<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Anotador de Pocha</title>
  <style>
    :root {
      --bg: #0f172a;
      --card-bg: #1e293b;
      --accent: #38bdf8;
      --accent-hover: #0284c7;
      --text: #f8fafc;
      --text-muted: #94a3b8;
      --border: #334155;
      --danger: #ef4444;
      --warning: #facc15;
      --success: #4ade80;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    body { background-color: var(--bg); color: var(--text); padding: 12px; display: flex; justify-content: center; }
    .container { width: 100%; max-width: 800px; }
    
    h1 { text-align: center; color: var(--accent); margin-bottom: 16px; font-weight: 700; font-size: 1.8rem; }
    
    .card { background: var(--card-bg); border-radius: 14px; padding: 18px; border: 1px solid var(--border); margin-bottom: 16px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
    
    /* Registro de Jugadores */
    .input-group { display: flex; gap: 10px; margin-bottom: 12px; }
    input[type="text"] { flex: 1; padding: 14px; border-radius: 10px; border: 1px solid var(--border); background: #0f172a; color: var(--text); font-size: 1.1rem; }
    
    button { background: var(--accent); color: #000; font-weight: 700; border: none; padding: 12px 16px; border-radius: 10px; cursor: pointer; transition: 0.2s; font-size: 1rem; }
    button:hover { opacity: 0.9; }
    
    .btn-danger { background: var(--danger); color: white; }
    .btn-warning { background: var(--warning); color: #000; }
    .btn-success { background: var(--success); color: #000; }
    
    .player-list { list-style: none; margin-bottom: 15px; }
    .player-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; background: #0f172a; border-radius: 8px; margin-bottom: 6px; font-size: 1.1rem; font-weight: 600; }
    
    /* Panel de Control de Ronda */
    .round-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
    .cards-badge { background: var(--accent); color: #000; padding: 6px 14px; border-radius: 20px; font-weight: 800; font-size: 1.1rem; }
    
    /* FILA DE JUGADOR CON NÚMEROS GRANDES */
    .grid-input { display: grid; grid-template-columns: 1.2fr 1fr 1fr; gap: 12px; align-items: center; margin-bottom: 12px; padding: 12px; background: #0f172a; border-radius: 10px; border: 1px solid var(--border); }
    .grid-input label { font-weight: 700; font-size: 1.2rem; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    
    /* MEJORA ACCESIBILIDAD NÚMEROS GRANDES */
    .num-input {
      width: 100%;
      height: 52px; /* Doble de alto */
      font-size: 1.8rem !important; /* Número extra grande */
      font-weight: 800;
      text-align: center;
      background: #1e293b;
      color: #fff;
      border: 2px solid var(--accent);
      border-radius: 10px;
      outline: none;
    }

    /* Tabla Resumen */
    .table-container { overflow-x: auto; border-radius: 8px; border: 1px solid var(--border); }
    table { width: 100%; border-collapse: collapse; text-align: center; font-size: 1rem; }
    th, td { padding: 12px 8px; border: 1px solid var(--border); }
    th { background: #0f172a; color: var(--accent); font-size: 1.05rem; }
    .score-cell { font-size: 1.3rem; font-weight: 800; }
    
    .hidden { display: none; }
    
    /* Botones de acción inferiores */
    .actions-grid { display: grid; grid-template-columns: 1fr; gap: 10px; margin-top: 15px; }
    @media (min-width: 600px) {
      .actions-grid { grid-template-columns: 1fr 1fr 1fr; }
    }
  </style>
</head>
<body>

<div class="container">
  <h1>🎴 Marcador de Pocha</h1>

  <!-- PANTALLA 1: Registro de Jugadores -->
  <div id="setup-screen" class="card">
    <h2 style="margin-bottom: 15px; font-size: 1.3rem;">Jugadores</h2>
    <div class="input-group">
      <input type="text" id="player-name" placeholder="Nombre del jugador" onkeypress="if(event.key==='Enter') addPlayer()">
      <button onclick="addPlayer()">Añadir</button>
    </div>
    <ul id="players-ul" class="player-list"></ul>
    <button onclick="startGame()" style="width: 100%; margin-top: 10px; height: 50px; font-size: 1.2rem;">Empezar Partida</button>
  </div>

  <!-- PANTALLA 2: Control de Partida -->
  <div id="game-screen" class="card hidden">
    <div class="round-header">
      <h2>Ronda <span id="current-round-num">1</span> / <span id="total-rounds-num">0</span></h2>
      <span class="cards-badge"><span id="current-cards-num">1</span> cartas</span>
    </div>

    <form id="round-form">
      <div style="display: grid; grid-template-columns: 1.2fr 1fr 1fr; gap: 12px; font-weight: bold; margin-bottom: 8px; text-align: center; color: var(--text-muted); font-size: 1rem;">
        <span>Jugador</span>
        <span>Pide</span>
        <span>Hace</span>
      </div>
      <div id="inputs-container"></div>
      
      <button type="button" onclick="submitRound()" style="width: 100%; margin-top: 15px; height: 54px; font-size: 1.2rem;">Anotar Ronda</button>
    </form>
  </div>

  <!-- PANTALLA 3: Clasificación y Tabla -->
  <div id="table-screen" class="card hidden">
    <h2 style="margin-bottom: 15px; font-size: 1.3rem;">Puntuación Total</h2>
    <div class="table-container">
      <table id="scores-table">
        <thead>
          <tr id="table-header">
            <th>Rnda (C)</th>
          </tr>
        </thead>
        <tbody id="table-body"></tbody>
      </table>
    </div>

    <!-- BOTONES DE ACCIÓN DE COLORES -->
    <div class="actions-grid">
      <button class="btn-warning" onclick="undoLastRound()">↩️ Deshacer Ronda</button>
      <button class="btn-success" onclick="exportSummary()">📊 Exportar Resumen</button>
      <button class="btn-danger" onclick="resetGame()">🗑️ Reiniciar Partida</button>
    </div>
  </div>
</div>

<script>
  let players = [];
  let roundsStructure = [];
  let currentRoundIndex = 0;
  let gameHistory = [];

  window.onload = () => {
    const savedState = localStorage.getItem('pocha_state');
    if (savedState) {
      const data = JSON.parse(savedState);
      players = data.players;
      roundsStructure = data.roundsStructure;
      currentRoundIndex = data.currentRoundIndex;
      gameHistory = data.gameHistory;
      
      if (players.length > 0 && roundsStructure.length > 0) {
        showGameUI();
      }
    }
  };

  function addPlayer() {
    const input = document.getElementById('player-name');
    const name = input.value.trim();
    if (name !== "") {
      players.push(name);
      input.value = "";
      renderPlayersList();
    }
  }

  function removePlayer(index) {
    players.splice(index, 1);
    renderPlayersList();
  }

  function renderPlayersList() {
    const ul = document.getElementById('players-ul');
    ul.innerHTML = "";
    players.forEach((p, idx) => {
      ul.innerHTML += `<li class="player-item"><span>${p}</span><button class="btn-danger" style="padding: 6px 12px; font-size: 0.9rem;" onclick="removePlayer(${idx})">X</button></li>`;
    });
  }

  function generateRounds(numPlayers) {
    let rounds = [];
    for (let i = 1; i <= 5; i++) rounds.push(i);
    for (let i = 0; i < numPlayers; i++) rounds.push(6);
    for (let i = 5; i >= 1; i--) rounds.push(i);
    return rounds;
  }

  function startGame() {
    if (players.length < 2) {
      alert("Añade al menos a 2 jugadores.");
      return;
    }
    roundsStructure = generateRounds(players.length);
    currentRoundIndex = 0;
    gameHistory = [];
    saveState();
    showGameUI();
  }

  function showGameUI() {
    document.getElementById('setup-screen').classList.add('hidden');
    document.getElementById('game-screen').classList.remove('hidden');
    document.getElementById('table-screen').classList.remove('hidden');
    
    setupTableHeader();
    renderCurrentRound();
    renderTable();
  }

  function setupTableHeader() {
    const tr = document.getElementById('table-header');
    tr.innerHTML = '<th>Rnda (C)</th>';
    players.forEach(p => {
      tr.innerHTML += `<th>${p}</th>`;
    });
  }

  function renderCurrentRound() {
    if (currentRoundIndex >= roundsStructure.length) {
      document.getElementById('game-screen').innerHTML = '<h2 style="text-align:center; padding: 20px;">🎉 ¡Fin de la partida!</h2>';
      return;
    }

    const cards = roundsStructure[currentRoundIndex];
    document.getElementById('current-round-num').innerText = currentRoundIndex + 1;
    document.getElementById('total-rounds-num').innerText = roundsStructure.length;
    document.getElementById('current-cards-num').innerText = cards;

    const container = document.getElementById('inputs-container');
    container.innerHTML = "";

    players.forEach((p, idx) => {
      container.innerHTML += `
        <div class="grid-input">
          <label>${p}</label>
          <input type="number" class="num-input" id="pide-${idx}" min="0" max="${cards}" value="0">
          <input type="number" class="num-input" id="hace-${idx}" min="0" max="${cards}" value="0">
        </div>
      `;
    });
  }

  function calculateScore(asked, made) {
    if (asked === made) {
      return 10 + (made * 3);
    } else {
      const diff = Math.abs(asked - made);
      return -(diff * 3);
    }
  }

  function submitRound() {
    let roundData = { round: currentRoundIndex + 1, cards: roundsStructure[currentRoundIndex], results: [] };
    
    for (let i = 0; i < players.length; i++) {
      const asked = parseInt(document.getElementById(`pide-${i}`).value) || 0;
      const made = parseInt(document.getElementById(`hace-${i}`).value) || 0;
      const pts = calculateScore(asked, made);
      
      const previousTotal = currentRoundIndex > 0 ? gameHistory[currentRoundIndex - 1].results[i].total : 0;
      const newTotal = previousTotal + pts;

      roundData.results.push({ asked, made, pts, total: newTotal });
    }

    gameHistory.push(roundData);
    currentRoundIndex++;
    
    saveState();
    renderCurrentRound();
    renderTable();
  }

  /* MOSTRAR ÚLTIMA RONDA ARRIBA DEL TODO */
  function renderTable() {
    const tbody = document.getElementById('table-body');
    tbody.innerHTML = "";

    // Invertimos la lista para que la última ronda aparezca primera
    const reversedHistory = [...gameHistory].reverse();

    reversedHistory.forEach(r => {
      let rowHtml = `<tr><td><strong>R${r.round}</strong> (${r.cards}c)</td>`;
      r.results.forEach(res => {
        const color = res.pts >= 0 ? 'var(--success)' : 'var(--danger)';
        rowHtml += `
          <td>
            <div class="score-cell">${res.total}</div>
            <div style="font-size:0.85rem; color: var(--text-muted);">${res.asked}/${res.made} (<span style="color:${color}">${res.pts >= 0 ? '+' : ''}${res.pts}</span>)</div>
          </td>
        `;
      });
      rowHtml += '</tr>';
      tbody.innerHTML += rowHtml;
    });
  }

  /* FUNCIÓN DESHACER ÚLTIMA RONDA */
  function undoLastRound() {
    if (gameHistory.length === 0) {
      alert("No hay rondas para deshacer.");
      return;
    }
    if (confirm("¿Quieres eliminar la última ronda anotada y volver atrás?")) {
      gameHistory.pop();
      currentRoundIndex--;
      saveState();
      renderCurrentRound();
      renderTable();
    }
  }

  /* FUNCIÓN EXPORTAR RESUMEN (TEXTO/WHATSAPP) */
  function exportSummary() {
    if (gameHistory.length === 0) {
      alert("Aún no hay puntos registrados.");
      return;
    }
    const lastRound = gameHistory[gameHistory.length - 1];
    let summaryText = `🎴 *Resumen de la Pocha (Ronda ${lastRound.round})*\n\n`;
    
    players.forEach((p, idx) => {
      const total = lastRound.results[idx].total;
      summaryText += `• *${p}*: ${total} pts\n`;
    });
    
    summaryText += `\n_Generado con Marcador de Pocha_`;

    if (navigator.share) {
      navigator.share({ title: 'Marcador de Pocha', text: summaryText });
    } else {
      navigator.clipboard.writeText(summaryText);
      alert("¡Clasificación copiada al portapapeles! Ya puedes pegarla en WhatsApp o Mensajes.");
    }
  }

  function saveState() {
    const state = { players, roundsStructure, currentRoundIndex, gameHistory };
    localStorage.setItem('pocha_state', JSON.stringify(state));
  }

  function resetGame() {
    if (confirm("¿Seguro que quieres borrar la partida actual y empezar de nuevo?")) {
      localStorage.removeItem('pocha_state');
      location.reload();
    }
  }
</script>
</body>
</html>
